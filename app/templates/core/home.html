<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOOI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
    }
    .wrap {
      max-width: 900px;
      margin: 80px auto;
      padding: 32px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }
    p {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.5;
    }
    .muted {
      color: #6b7280;
    }
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }
    a.button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid #111827;
      color: #111827;
      font-weight: 600;
    }
    a.button.primary {
      background: #111827;
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="muted">Sistema Operativo de Oportunidades Inmobiliarias</p>
    <h1>SOOI</h1>
    <p>Base inicial del proyecto ya operativa.</p>
    <p class="muted">Siguiente fase: navegación, bandeja de captación y flujo real de oportunidades.</p>

    <div class="actions">
      <a class="btn btn-primary" href="/accounts/login/">Acceder</a>
    </div>
  </main>
</body>
</html>
