<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SOOI{% endblock %}</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f6fb;
        color: #18212b;
      }

      .public-shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }

      .page-card {
        background: #fff;
        border: 1px solid #dbe3ee;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-block;
        padding: 10px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        background: #fff;
        color: #18212b;
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-primary {
        background: #0f172a;
        border-color: #0f172a;
        color: #fff;
      }

      input[type="text"],
      input[type="password"],
      input[type="email"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #dbe3ee;
        border-radius: 10px;
        font: inherit;
        box-sizing: border-box;
      }

      label {
        font-weight: 600;
      }

      p {
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="public-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
